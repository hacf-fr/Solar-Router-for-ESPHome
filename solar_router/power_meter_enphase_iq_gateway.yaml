# ----------------------------------------------------------------------------------------------------
# Power Meter - Enphase IQ Gateway (Firmware >= 7.x, JWT token authentication)
#
# This power meter reads the grid import/export power from an Enphase IQ Gateway
# using the local HTTPS API with token-based authentication.
# It is required for all modern Enphase IQ Gateways (formerly "Envoy") running
# firmware 7.x and above.
#
# Required variables:
#   power_meter_ip_address : IP address or hostname of the IQ Gateway
#                            (e.g. "192.168.1.50" or "envoy.local")
#   enphase_token          : JWT token used to authenticate with the IQ Gateway.
#
# How to obtain the JWT token:
#   1. Log in to https://enlighten.enphaseenergy.com
#   2. Navigate to your system, then open your browser developer tools (F12)
#   3. Go to Application → Cookies and copy the value of "enlighten-4-token"
#   Alternatively, use the community tool:
#   https://entrez.enphaseenergy.com (generates a local-access token)
#   Tokens are valid for 1 year. Renew when expired.
#
# Usage example in your main yaml:
#   packages:
#     solar_router:
#       url: https://github.com/hacf-fr/Solar-Router-for-ESPHome
#       refresh: 1d
#       files:
#         - path: solar_router/common.yaml
#         - path: solar_router/power_meter_enphase_iq_gateway.yaml
#           vars:
#             power_meter_ip_address: "192.168.1.50"
#             enphase_token: "eyJhbGciOi..."
#
# API endpoint used: GET https://<gateway>/production.json
# SSL verification is disabled because the IQ Gateway uses a self-signed certificate.
# The "net-consumption" measurement (consumption[1].wNow) represents the power
# exchanged with the grid:
#   - Positive value → energy is drawn FROM the grid
#   - Negative value → energy is PUSHED TO the grid (solar surplus)
# ----------------------------------------------------------------------------------------------------
<<: !include power_meter_common.yaml

# ----------------------------------------------------------------------------------------------------
# Use http request component
# ----------------------------------------------------------------------------------------------------
http_request:
  id: http_request_data
  useragent: esphome/device
  timeout: 10s
  verify_ssl: false # IQ Gateway uses a self-signed certificate

# ----------------------------------------------------------------------------------------------------
# Define scripts for power collection
# ----------------------------------------------------------------------------------------------------
script:
  # Enphase IQ Gateway script reads the grid power from the local production.json endpoint.
  # The JWT Bearer token is sent in the Authorization header to authenticate the request.
  # The "net-consumption" entry (index 1 of the consumption array) reports the net
  # power exchanged with the grid. A positive value means power is consumed from the
  # grid; a negative value means excess solar power is being exported to the grid.
  - id: power_meter_source
    mode: single
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - http_request.get:
                url: https://${power_meter_ip_address}/production.json
                request_headers:
                  Authorization: "Bearer ${enphase_token}"
                capture_response: true
                max_response_buffer_size: 4096
                on_response:
                  then:
                    - lambda: |-
                        json::parse_json(body, [](JsonObject root) -> bool {
                          // consumption[1] is the "net-consumption" meter:
                          // positive  → drawing from grid
                          // negative  → exporting to grid (solar surplus)
                          JsonArray consumption = root["consumption"];
                          if (consumption.size() >= 2) {
                            id(real_power).publish_state(consumption[1]["wNow"].as<float>());
                          }
                          return true;
                        });

# ----------------------------------------------------------------------------------------------------
# Trigger power meter reading every second
# ----------------------------------------------------------------------------------------------------
time:
  - platform: sntp
    on_time:
      - seconds: /1
        then:
          - if:
              condition:
                - lambda: return id(power_meter_activated) != 0;
              then:
                - script.execute: power_meter_source
